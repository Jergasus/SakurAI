services:
  mongo:
    image: mongo:7
    container_name: saas-agents-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: saas-agents-api
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/saas_agents}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - VECTOR_SEARCH_MODE=${VECTOR_SEARCH_MODE:-local}
      - CORS_ALLOW_ALL=${CORS_ALLOW_ALL:-true}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@localhost}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-admin123}
      - DEFAULT_ADMIN_NAME=${DEFAULT_ADMIN_NAME:-My Agent}
      - DEFAULT_ADMIN_NICHE=${DEFAULT_ADMIN_NICHE:-restaurant}
      - THROTTLE_LIMIT=${THROTTLE_LIMIT:-60}
    ports:
      - "3000:3000"
    networks:
      - app-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: saas-agents-web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
